<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finances</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #0F1117; color: #E8EAF0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#app { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
#sidebar { background: #1C1F2E; border-right: 1px solid #2A2F42; padding: 24px 0; overflow-y: auto; }
.brand { padding: 0 24px 28px; display: flex; align-items: center; gap: 12px; }
.brand-icon { width: 36px; height: 36px; background: #4F8EF7; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
.brand-name { font-weight: 700; font-size: 16px; }
.nav-section { padding: 12px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 8px; color: #8B92A8; cursor: pointer; width: 100%; text-align: left; border: none; background: none; font-size: 14px; }
.nav-item:hover { background: #252938; color: #E8EAF0; }
.nav-item.active { background: rgba(79, 142, 247, 0.12); color: #4F8EF7; }
#main { overflow-y: auto; padding: 32px 40px; }
.view-header { margin-bottom: 28px; }
.view-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.view-sub { color: #8B92A8; font-size: 13px; }
.card { background: #1C1F2E; border: 1px solid #2A2F42; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 12px; color: #8B92A8; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; }
.empty { text-align: center; padding: 60px 20px; }
.empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.btn { padding: 9px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; background: #4F8EF7; color: white; }
.btn:hover { background: #3B6FC9; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div class="brand-icon">₣</div>
      <div class="brand-name">Finances</div>
    </div>
    <div class="nav-section">
      <button class="nav-item active" onclick="go('dashboard')">📊 Vue d'ensemble</button>
      <button class="nav-item" onclick="go('transactions')">💳 Transactions</button>
      <button class="nav-item" onclick="go('patrimoine')">🏠 Patrimoine</button>
      <button class="nav-item" onclick="go('plan')">📋 Plan d'action</button>
      <button class="nav-item" onclick="go('objectifs')">🎯 Objectifs</button>
      <button class="nav-item" onclick="go('settings')">⚙️ Paramètres</button>
    </div>
  </div>
  <div id="main">
    <div id="view">
      <div class="view-header">
        <div class="view-title">Vue d'ensemble</div>
        <div class="view-sub">Tableau de bord de tes finances</div>
      </div>
      <div class="card">
        <div class="card-title">Soldes actuels</div>
        <div style="padding: 20px 0;">
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
            <div><div style="color: #8B92A8; font-size: 12px;">BNP Courant</div><div style="font-size: 20px; font-weight: 700; margin-top: 4px;">1 410,04 €</div></div>
            <div><div style="color: #8B92A8; font-size: 12px;">BoursoBank</div><div style="font-size: 20px; font-weight: 700; margin-top: 4px;">1 178,60 €</div></div>
            <div><div style="color: #8B92A8; font-size: 12px;">Livret A</div><div style="font-size: 20px; font-weight: 700; margin-top: 4px;">14,38 €</div></div>
            <div><div style="color: #8B92A8; font-size: 12px;">CARDIF Élite</div><div style="font-size: 20px; font-weight: 700; margin-top: 4px;">29 400,00 €</div></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Bienvenue !</div>
        <p style="margin-bottom: 16px;">L'app est en cours de chargement. Si tu vois ce message, la configuration de base fonctionne.</p>
        <button class="btn" onclick="testConnection()">Tester la connexion au backend</button>
      </div>
    </div>
  </div>
</div>

<script>
const state = {
  currentView: 'dashboard',
  backendUrl: localStorage.getItem('finances_backend_url') || '',
  userId: localStorage.getItem('finances_user_id') || generateUUID()
};

if (!localStorage.getItem('finances_user_id')) {
  localStorage.setItem('finances_user_id', state.userId);
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function go(view) {
  state.currentView = view;
  updateNav();
  
  const viewEl = document.getElementById('view');
  const titles = {
    'dashboard': 'Vue d\'ensemble',
    'transactions': 'Transactions',
    'patrimoine': 'Patrimoine',
    'plan': 'Plan d\'action',
    'objectifs': 'Objectifs',
    'settings': 'Paramètres'
  };
  
  viewEl.innerHTML = `
    <div class="view-header">
      <div class="view-title">${titles[view]}</div>
      <div class="view-sub">Section ${view}</div>
    </div>
    <div class="card">
      <p>La vue ${view} sera bientôt disponible.</p>
      <p style="margin-top: 16px; color: #8B92A8; font-size: 12px;">Backend URL: ${state.backendUrl || '(non configuré)'}</p>
      <p style="margin-top: 8px; color: #8B92A8; font-size: 12px;">User ID: ${state.userId}</p>
    </div>
  `;
}

function updateNav() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });
  const current = document.querySelector(`[onclick="go('${state.currentView}')"]`);
  if (current) current.classList.add('active');
}

async function testConnection() {
  if (!state.backendUrl) {
    alert('Configure l\'URL du backend dans Paramètres d\'abord');
    return;
  }
  
  try {
    const res = await fetch(state.backendUrl + '/health');
    const data = await res.json();
    alert('✓ Connexion réussie au backend!\n' + JSON.stringify(data, null, 2));
  } catch (err) {
    alert('✗ Erreur de connexion:\n' + err.message);
  }
}

console.log('App loaded successfully');
</script>

</body>
</html>
