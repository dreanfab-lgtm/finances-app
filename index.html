<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0F1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances">
<title>Finances</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1117;--surface:#1C1F2E;--surface-2:#252938;--border:#2A2F42;--text:#E8EAF0;--text-dim:#8B92A8;--text-faint:#5C6379;--primary:#4F8EF7;--primary-dim:#3B6FC9;--success:#2ECC8A;--danger:#E8504A;--warning:#F5B342}*{box-sizing:border-box;margin:0;padding:0}html,body{height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;overflow:hidden}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input,select,textarea{font-family:inherit;font-size:14px}
#app{display:flex;flex-direction:column;height:100vh}#header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface)}.header-title{font-size:20px;font-weight:700}
#main{flex:1;overflow-y:auto;padding:20px 20px 80px}
#nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:0;padding:0;z-index:100;padding-bottom:env(safe-area-inset-bottom)}.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;color:var(--text-dim);border:none;background:none;cursor:pointer;transition:all 0.15s;padding:8px 0}.nav-btn.active{color:var(--primary)}.nav-btn span{font-size:18px}
.view{display:none}.view.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}.card-title{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:8px}
.btn{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;border:1px solid transparent;cursor:pointer}.btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:var(--primary-dim)}.btn-sm{padding:6px 10px;font-size:12px}.btn-danger{background:rgba(232,80,74,0.12);color:var(--danger)}
.input-group{margin-bottom:12px}.input-label{display:block;margin-bottom:6px;font-weight:600;font-size:13px}.input-field{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font-size:13px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:20px}.modal.active{display:flex}.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}.tx-date{color:var(--text-dim);font-size:11px;min-width:60px}.tx-desc{flex:1;margin:0 8px;font-size:12px}.tx-amount{font-weight:600;min-width:70px;text-align:right;font-size:12px}.tx-amount.pos{color:var(--success)}.tx-amount.neg{color:var(--danger)}.sync-badge{display:inline-block;font-size:10px;padding:4px 8px;border-radius:4px;background:rgba(46,204,138,0.12);color:var(--success);margin-top:8px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-title">Finances</div>
  </div>
  
  <div id="main">
    <div id="dashboard" class="view active"></div>
    <div id="transactions" class="view"></div>
    <div id="patrimoine" class="view"></div>
    <div id="plan" class="view"></div>
    <div id="settings" class="view"></div>
  </div>

  <div id="nav">
    <button class="nav-btn active" onclick="goTo('dashboard')"><span>📊</span>Vue</button>
    <button class="nav-btn" onclick="goTo('transactions')"><span>💳</span>TX</button>
    <button class="nav-btn" onclick="goTo('patrimoine')"><span>🏠</span>Pat</button>
    <button class="nav-btn" onclick="goTo('plan')"><span>📋</span>Plan</button>
    <button class="nav-btn" onclick="goTo('settings')"><span>⚙️</span>Param</button>
  </div>
</div>

<div id="txModal" class="modal">
  <div class="modal-content">
    <div style="font-size:16px;font-weight:700;margin-bottom:12px">Ajouter une transaction</div>
    <div class="input-group">
      <label class="input-label">Date</label>
      <input type="date" id="txDate" class="input-field">
    </div>
    <div class="input-group">
      <label class="input-label">Description</label>
      <input type="text" id="txDesc" class="input-field" placeholder="Ex: Salaire, Course...">
    </div>
    <div class="input-group">
      <label class="input-label">Montant (€)</label>
      <input type="number" id="txAmount" class="input-field" placeholder="0.00" step="0.01">
    </div>
    <div class="input-group">
      <label class="input-label">Compte</label>
      <select id="txAccount" class="input-field">
        <option value="acc_bnp">BNP Courant</option>
        <option value="acc_bourso">BoursoBank</option>
        <option value="acc_liv">Livret A</option>
        <option value="acc_card">CARDIF Élite</option>
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">Type</label>
      <select id="txType" class="input-field">
        <option value="expense">Dépense (-)</option>
        <option value="income">Revenu (+)</option>
        <option value="transfer">Transfert</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="saveTx()">Enregistrer</button>
      <button class="btn" onclick="closeModal()" style="background:var(--surface-2)">Annuler</button>
    </div>
  </div>
</div>

<script>
const DB_NAME = 'finances_v2';
const STORES = ['transactions', 'accounts'];

const state = {
  currentView: 'dashboard',
  backendUrl: localStorage.getItem('finances_backend_url') || '',
  userId: localStorage.getItem('finances_user_id') || generateUUID(),
  transactions: [],
  accounts: [
    {id: 'acc_bnp', name: 'BNP Courant', solde: 1410.04},
    {id: 'acc_bourso', name: 'BoursoBank', solde: 1178.60},
    {id: 'acc_liv', name: 'Livret A', solde: 14.38},
    {id: 'acc_card', name: 'CARDIF Élite', solde: 29400.00},
    {id: 'acc_maison', name: 'Maison', solde: 250000.00}
  ]
};

if (!localStorage.getItem('finances_user_id')) {
  localStorage.setItem('finances_user_id', state.userId);
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function formatCurrency(n) {
  return new Intl.NumberFormat('fr-FR', {style: 'currency', currency: 'EUR'}).format(n);
}

async function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onerror = () => reject(req.error);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      for (const store of STORES) {
        if (!db.objectStoreNames.contains(store)) {
          db.createObjectStore(store, {keyPath: 'id'});
        }
      }
    };
    req.onsuccess = () => resolve(req.result);
  });
}

async function dbPut(store, obj) {
  const db = await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(obj);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
  });
}

async function dbGetAll(store) {
  const db = await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
  });
}

async function dbDelete(store, id) {
  const db = await initDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
  });
}

async function loadTransactions() {
  state.transactions = await dbGetAll('transactions');
  state.transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
}

async function syncFromBackend() {
  if (!state.backendUrl) return;
  try {
    const url = state.backendUrl.endsWith('/') ? state.backendUrl : state.backendUrl + '/';
    console.log('Synchro de:', url + 'api/sync/' + state.userId);
    const res = await fetch(url + 'api/sync/' + state.userId, {timeout: 5000});
    if (!res.ok) {
      console.log('Erreur backend:', res.status);
      return;
    }
    const data = await res.json();
    console.log('Backend retourne:', data.transactions ? data.transactions.length + ' TX' : '0 TX');
    
    if (data.transactions && data.transactions.length > 0) {
      for (const tx of data.transactions) {
        const txObj = {
          id: tx.id,
          date: tx.date,
          description: tx.note || tx.description || 'Transaction',
          amount: parseFloat(tx.amount),
          account: tx.accountId,
          type: tx.type,
          createdAt: tx.created_at
        };
        await dbPut('transactions', txObj);
      }
      await loadTransactions();
      if (state.currentView === 'transactions' || state.currentView === 'dashboard') {
        renderView();
      }
      console.log('✓ Synchro OK: ' + data.transactions.length + ' transactions');
    }
  } catch (err) {
    console.log('Erreur synchro:', err.message);
  }
}

async function syncToBackend(tx) {
  if (!state.backendUrl) return;
  try {
    const url = state.backendUrl.endsWith('/') ? state.backendUrl : state.backendUrl + '/';
    await fetch(url + 'api/transaction', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        userId: state.userId,
        transaction: {
          id: tx.id,
          date: tx.date,
          amount: tx.amount,
          type: tx.type,
          accountId: tx.account,
          note: tx.description
        }
      })
    });
    console.log('✓ TX envoyée au backend');
  } catch (err) {
    console.log('Erreur upload TX:', err.message);
  }
}

function goTo(view) {
  state.currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(view).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.nav-btn').classList.add('active');
  renderView();
}

function renderView() {
  const viewEl = document.getElementById(state.currentView);
  
  if (state.currentView === 'dashboard') {
    const totalSoldes = state.accounts.reduce((sum, a) => sum + a.solde, 0);
    const thisMonthTx = state.transactions.filter(t => {
      const d = new Date(t.date);
      return d.getMonth() === new Date().getMonth() && d.getFullYear() === new Date().getFullYear();
    });
    const income = thisMonthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expenses = thisMonthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    
    viewEl.innerHTML = `
      <div style="margin-bottom:12px"><button class="btn btn-primary" onclick="openModal()">+ Transaction</button></div>
      <div class="card">
        <div class="card-title">Soldes</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${state.accounts.slice(0, 4).map(a => `<div><div style="color:var(--text-dim);font-size:10px">${a.name}</div><div style="font-size:14px;font-weight:700;margin-top:2px">${formatCurrency(a.solde)}</div></div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-title">Total</div>
        <div style="font-size:20px;font-weight:700;color:var(--success)">${formatCurrency(totalSoldes)}</div>
      </div>
      <div class="card">
        <div class="card-title">Ce mois</div>
        <div><span style="color:var(--success)">↑ ${formatCurrency(income)}</span> · <span style="color:var(--danger)">↓ ${formatCurrency(expenses)}</span></div>
      </div>
    `;
  } else if (state.currentView === 'transactions') {
    viewEl.innerHTML = `
      <div style="margin-bottom:12px"><button class="btn btn-primary" onclick="openModal()">+ TX</button></div>
      <div class="card">
        <div class="card-title">Historique (${state.transactions.length})</div>
        <div>
          ${state.transactions.length === 0 ? '<div style="color:var(--text-dim);font-size:12px">Aucune TX</div>' : state.transactions.slice(0, 30).map(t => `
            <div class="tx-row">
              <div class="tx-date">${t.date}</div>
              <div class="tx-desc">${t.description}</div>
              <div class="tx-amount ${t.type === 'income' ? 'pos' : 'neg'}">${(t.type === 'income' ? '+' : '-')}${formatCurrency(Math.abs(t.amount))}</div>
            </div>
          `).join('')}
        </div>
        <div class="sync-badge">🔄 ${state.backendUrl ? 'Synchro active' : 'Local'}</div>
      </div>
    `;
  } else if (state.currentView === 'patrimoine') {
    viewEl.innerHTML = `
      <div class="card">
        <div class="card-title">Comptes</div>
        ${state.accounts.map(a => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span>${a.name}</span><span style="font-weight:600">${formatCurrency(a.solde)}</span></div>`).join('')}
      </div>
    `;
  } else if (state.currentView === 'plan') {
    viewEl.innerHTML = `
      <div class="card">
        <div class="card-title">Phases</div>
        <div style="font-size:13px">
          <div style="margin-bottom:12px"><div style="font-weight:600">Phase 1</div><div style="color:var(--text-dim);font-size:11px">Alternance (juil-sept 2026)</div></div>
          <div style="margin-bottom:12px"><div style="font-weight:600">Phase 2</div><div style="color:var(--text-dim);font-size:11px">ARE + AFPA (oct 2026 - mar 2028)</div></div>
          <div><div style="font-weight:600">Phase 3</div><div style="color:var(--text-dim);font-size:11px">Auto-entrepreneur (mar 2028+)</div></div>
        </div>
      </div>
    `;
  } else if (state.currentView === 'settings') {
    viewEl.innerHTML = `
      <div class="card">
        <div class="card-title">Backend</div>
        <div class="input-group">
          <label class="input-label">URL</label>
          <input type="text" id="backendUrl" value="${state.backendUrl}" class="input-field" placeholder="https://...">
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="saveBackendUrl()">Enregistrer</button>
          <button class="btn btn-primary btn-sm" onclick="testBackendConnection()">Tester</button>
          <button class="btn btn-primary btn-sm" onclick="syncFromBackend()">Recharger</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Info</div>
        <div style="font-size:11px;color:var(--text-dim);line-height:1.6">
          <div><strong>ID:</strong> ${state.userId.slice(0, 8)}...</div>
          <div><strong>Backend:</strong> ${state.backendUrl ? '✓ Configuré' : '✗ Non'}</div>
          <div><strong>TX locales:</strong> ${state.transactions.length}</div>
        </div>
      </div>
    `;
  }
}

function openModal() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('txDate').value = today;
  document.getElementById('txDesc').value = '';
  document.getElementById('txAmount').value = '';
  document.getElementById('txAccount').value = 'acc_bnp';
  document.getElementById('txType').value = 'expense';
  document.getElementById('txModal').classList.add('active');
}

function closeModal() {
  document.getElementById('txModal').classList.remove('active');
}

async function saveTx() {
  const date = document.getElementById('txDate').value;
  const desc = document.getElementById('txDesc').value;
  const amount = parseFloat(document.getElementById('txAmount').value);
  const account = document.getElementById('txAccount').value;
  const type = document.getElementById('txType').value;

  if (!date || !desc || !amount) {
    alert('Remplis tous les champs');
    return;
  }

  const tx = {
    id: 'tx_' + Date.now(),
    date,
    description: desc,
    amount,
    account,
    type,
    createdAt: new Date().toISOString()
  };

  await dbPut('transactions', tx);
  await syncToBackend(tx);
  
  const acc = state.accounts.find(a => a.id === account);
  if (acc) {
    if (type === 'income' || type === 'transfer') {
      acc.solde += amount;
    } else {
      acc.solde -= amount;
    }
    await dbPut('accounts', acc);
  }

  closeModal();
  await loadTransactions();
  renderView();
}

function saveBackendUrl() {
  const url = document.getElementById('backendUrl').value;
  state.backendUrl = url;
  localStorage.setItem('finances_backend_url', url);
  alert('✓ URL enregistrée');
}

async function testBackendConnection() {
  if (!state.backendUrl) {
    alert('Configure l\'URL d\'abord');
    return;
  }
  try {
    const url = state.backendUrl.endsWith('/') ? state.backendUrl : state.backendUrl + '/';
    const res = await fetch(url + 'health', {timeout: 5000});
    if (res.ok) {
      alert('✓ Connexion réussie!');
    } else {
      alert('✗ Erreur ' + res.status);
    }
  } catch (err) {
    alert('✗ Erreur:\n' + err.message);
  }
}

document.addEventListener('DOMContentLoaded', async function() {
  await loadTransactions();
  await syncFromBackend();
  setInterval(syncFromBackend, 30000);
  renderView();
  console.log('✓ App mobile chargée');
});

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    syncFromBackend();
  }
});

document.getElementById('txModal').onclick = (e) => {
  if (e.target === document.getElementById('txModal')) closeModal();
};
</script>

</body>
</html>
