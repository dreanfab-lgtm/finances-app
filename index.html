<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0F1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances">
<title>Finances — Tableau de bord</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F1117'/><path d='M28 70V30h18c10 0 16 6 16 14 0 6-3 10-8 12l11 14H53l-9-12h-4v12H28zm12-22h6c3 0 5-2 5-5s-2-5-5-5h-6v10z' fill='%234F8EF7'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F1117'/><path d='M28 70V30h18c10 0 16 6 16 14 0 6-3 10-8 12l11 14H53l-9-12h-4v12H28zm12-22h6c3 0 5-2 5-5s-2-5-5-5h-6v10z' fill='%234F8EF7'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0F1117;--surface:#1C1F2E;--surface-2:#252938;--border:#2A2F42;--text:#E8EAF0;--text-dim:#8B92A8;--text-faint:#5C6379;--primary:#4F8EF7;--primary-dim:#3B6FC9;--success:#2ECC8A;--danger:#E8504A;--warning:#F5B342;--shadow:0 4px 20px rgba(0,0,0,0.3);--radius:12px;--radius-sm:8px}*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input,select,textarea{font-family:inherit;font-size:14px}
#app{display:grid;grid-template-columns:240px 1fr;height:100vh;height:100dvh}#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;overflow-y:auto}.brand{padding:0 24px 28px;display:flex;align-items:center;gap:12px}.brand-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#7BA9FF);display:grid;place-items:center;font-weight:800;color:white;font-size:18px}.brand-name{font-weight:700;font-size:16px}.nav-section{padding:0 12px;flex:1}.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius-sm);color:var(--text-dim);font-size:14px;font-weight:500;width:100%;text-align:left;transition:all 0.15s;border:none;background:none;cursor:pointer}.nav-item:hover{background:var(--surface-2);color:var(--text)}.nav-item.active{background:rgba(79,142,247,0.12);color:var(--primary)}.sidebar-footer{padding:12px 24px;border-top:1px solid var(--border);font-size:11px;color:var(--text-faint)}
#main{overflow-y:auto;overflow-x:hidden;padding:32px 40px 100px;scroll-behavior:smooth}.view-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;gap:16px;flex-wrap:wrap}.view-title{font-size:24px;font-weight:700}.view-sub{color:var(--text-dim);font-size:13px;margin-top:4px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}.card-title{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:12px}.btn{padding:9px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;border:1px solid transparent;cursor:pointer}.btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:var(--primary-dim)}.empty{text-align:center;padding:60px 20px}.empty-title{font-size:20px;font-weight:700;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div class="brand-icon">₣</div>
      <div>
        <div class="brand-name">Finances</div>
        <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase">FAB • 2026</div>
      </div>
    </div>
    <div class="nav-section">
      <button class="nav-item active" onclick="go('dashboard')">📊 Vue d'ensemble</button>
      <button class="nav-item" onclick="go('transactions')">💳 Transactions</button>
      <button class="nav-item" onclick="go('patrimoine')">🏠 Patrimoine</button>
      <button class="nav-item" onclick="go('plan')">📋 Plan d'action</button>
      <button class="nav-item" onclick="go('objectifs')">🎯 Objectifs</button>
      <button class="nav-item" onclick="go('settings')">⚙️ Paramètres</button>
    </div>
    <div class="sidebar-footer">Données 100% locales<br>Aucun envoi externe</div>
  </div>
  <div id="main">
    <div id="view"></div>
  </div>
</div>

<script>
const state = {
  currentView: 'dashboard',
  backendUrl: localStorage.getItem('finances_backend_url') || '',
  userId: localStorage.getItem('finances_user_id') || generateUUID(),
  accounts: [
    {id: 'acc_bnp', name: 'BNP Courant', solde: 1410.04},
    {id: 'acc_bourso', name: 'BoursoBank', solde: 1178.60},
    {id: 'acc_liv', name: 'Livret A', solde: 14.38},
    {id: 'acc_card', name: 'CARDIF Élite', solde: 29400.00},
    {id: 'acc_maison', name: 'Maison', solde: 250000.00}
  ]
};

if (!localStorage.getItem('finances_user_id')) {
  localStorage.setItem('finances_user_id', state.userId);
}

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function formatCurrency(n) {
  return new Intl.NumberFormat('fr-FR', {style: 'currency', currency: 'EUR'}).format(n);
}

function go(view) {
  state.currentView = view;
  updateNav();
  renderView();
}

function updateNav() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });
  const current = document.querySelector(`[onclick="go('${state.currentView}')"]`);
  if (current) current.classList.add('active');
}

function renderView() {
  const viewEl = document.getElementById('view');
  
  if (state.currentView === 'dashboard') {
    renderDashboard();
  } else if (state.currentView === 'transactions') {
    renderTransactions();
  } else if (state.currentView === 'patrimoine') {
    renderPatrimoine();
  } else if (state.currentView === 'plan') {
    renderPlan();
  } else if (state.currentView === 'objectifs') {
    renderObjectifs();
  } else if (state.currentView === 'settings') {
    renderSettings();
  }
}

function renderDashboard() {
  const totalSoldes = state.accounts.reduce((sum, a) => sum + a.solde, 0);
  const html = `
    <div class="view-header">
      <div>
        <div class="view-title">Vue d'ensemble</div>
        <div class="view-sub">Tableau de bord de tes finances</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Soldes actuels</div>
      <div style="padding:20px 0">
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">
          ${state.accounts.map(a => `
            <div>
              <div style="color:var(--text-dim);font-size:12px">${a.name}</div>
              <div style="font-size:18px;font-weight:700;margin-top:4px">${formatCurrency(a.solde)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Total patrimoine</div>
      <div style="font-size:28px;font-weight:700;color:var(--success)">${formatCurrency(totalSoldes)}</div>
    </div>
  `;
  document.getElementById('view').innerHTML = html;
}

function renderTransactions() {
  const html = `
    <div class="view-header">
      <div class="view-title">Transactions</div>
      <div class="view-sub">Gérer tes mouvements</div>
    </div>
    <div class="card">
      <p>Les transactions seront bientôt disponibles</p>
      <p style="margin-top:16px;color:var(--text-dim);font-size:12px">Fonctionnalité en développement</p>
    </div>
  `;
  document.getElementById('view').innerHTML = html;
}

function renderPatrimoine() {
  const html = `
    <div class="view-header">
      <div class="view-title">Patrimoine</div>
      <div class="view-sub">Vue d'ensemble de tes actifs</div>
    </div>
    <div class="card">
      <div class="card-title">Comptes et actifs</div>
      <div style="padding:16px 0">
        ${state.accounts.map(a => `
          <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
            <span>${a.name}</span>
            <span style="font-weight:600">${formatCurrency(a.solde)}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('view').innerHTML = html;
}

function renderPlan() {
  const html = `
    <div class="view-header">
      <div class="view-title">Plan d'action</div>
      <div class="view-sub">Ta stratégie 2026-2028</div>
    </div>
    <div class="card">
      <div class="card-title">Phases</div>
      <div style="padding:16px 0">
        <div style="margin-bottom:20px">
          <div style="font-weight:600;margin-bottom:4px">Phase 1 : Alternance (juillet-septembre 2026)</div>
          <div style="color:var(--text-dim);font-size:13px">Revenus: 1 800€/mois | Charges: 1 178€</div>
        </div>
        <div style="margin-bottom:20px">
          <div style="font-weight:600;margin-bottom:4px">Phase 2 : ARE (octobre 2026 - mars 2028)</div>
          <div style="color:var(--text-dim);font-size:13px">Revenus: 1 378€/mois + Formation AFPA</div>
        </div>
        <div>
          <div style="font-weight:600;margin-bottom:4px">Phase 3 : Auto-entrepreneur (mars 2028+)</div>
          <div style="color:var(--text-dim);font-size:13px">Passage en indépendant électricien</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('view').innerHTML = html;
}

function renderObjectifs() {
  const html = `
    <div class="view-header">
      <div class="view-title">Objectifs</div>
      <div class="view-sub">Tes cibles financières</div>
    </div>
    <div class="card">
      <div class="card-title">Objectifs 2026-2028</div>
      <div style="padding:16px 0">
        <div style="margin-bottom:16px;padding:12px;background:var(--surface-2);border-radius:8px">
          <div style="font-weight:600;margin-bottom:4px">Coussin Livret A: 3 000€</div>
          <div style="color:var(--text-dim);font-size:13px">Actuellement: ${formatCurrency(14.38)}</div>
        </div>
        <div style="margin-bottom:16px;padding:12px;background:var(--surface-2);border-radius:8px">
          <div style="font-weight:600;margin-bottom:4px">Reconstitution Bourso</div>
          <div style="color:var(--text-dim);font-size:13px">Actuellement: ${formatCurrency(1178.60)}</div>
        </div>
        <div style="padding:12px;background:var(--surface-2);border-radius:8px">
          <div style="font-weight:600;margin-bottom:4px">Préparation auto-entrepreneur</div>
          <div style="color:var(--text-dim);font-size:13px">Accumulation graduelle</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('view').innerHTML = html;
}

function renderSettings() {
  const html = `
    <div class="view-header">
      <div class="view-title">Paramètres</div>
      <div class="view-sub">Configuration et synchronisation</div>
    </div>
    <div class="card">
      <div class="card-title">Backend & Synchronisation</div>
      <div style="padding:16px 0">
        <div style="margin-bottom:16px">
          <label style="display:block;margin-bottom:8px;font-weight:600">URL du backend</label>
          <input type="text" id="backendUrl" value="${state.backendUrl}" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font-size:13px" placeholder="https://...">
        </div>
        <button class="btn btn-primary" onclick="saveBackendUrl()" style="margin-right:8px">Enregistrer</button>
        <button class="btn btn-primary" onclick="testBackendConnection()">Tester la connexion</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Informations</div>
      <div style="padding:16px 0;font-size:13px;color:var(--text-dim)">
        <div style="margin-bottom:8px"><strong>User ID:</strong> ${state.userId}</div>
        <div><strong>Backend URL:</strong> ${state.backendUrl || '(non configuré)'}</div>
      </div>
    </div>
  `;
  document.getElementById('view').innerHTML = html;
}

function saveBackendUrl() {
  const url = document.getElementById('backendUrl').value;
  state.backendUrl = url;
  localStorage.setItem('finances_backend_url', url);
  alert('✓ URL enregistrée');
}

async function testBackendConnection() {
  if (!state.backendUrl) {
    alert('Configure l\'URL du backend d\'abord');
    return;
  }
  try {
    const res = await fetch(state.backendUrl + '/health');
    const data = await res.json();
    alert('✓ Connexion réussie!\\n' + JSON.stringify(data, null, 2));
  } catch (err) {
    alert('✗ Erreur:\\n' + err.message);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  go('dashboard');
  console.log('✓ App chargée avec succès');
});
</script>

</body>
</html>
