<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0F1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances">
<title>Finances — Tableau de bord</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F1117'/><path d='M28 70V30h18c10 0 16 6 16 14 0 6-3 10-8 12l11 14H53l-9-12h-4v12H28zm12-22h6c3 0 5-2 5-5s-2-5-5-5h-6v10z' fill='%234F8EF7'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F1117'/><path d='M28 70V30h18c10 0 16 6 16 14 0 6-3 10-8 12l11 14H53l-9-12h-4v12H28zm12-22h6c3 0 5-2 5-5s-2-5-5-5h-6v10z' fill='%234F8EF7'/></svg>">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0F1117;--surface:#1C1F2E;--surface-2:#252938;--border:#2A2F42;
  --text:#E8EAF0;--text-dim:#8B92A8;--text-faint:#5C6379;
  --primary:#4F8EF7;--primary-dim:#3B6FC9;--success:#2ECC8A;--danger:#E8504A;--warning:#F5B342;
  --shadow:0 4px 20px rgba(0,0,0,0.3);--radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-feature-settings:'cv02','cv03','cv04','cv11';-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
.num{font-variant-numeric:tabular-nums}

#app{display:grid;grid-template-columns:240px 1fr;height:100vh;height:100dvh}
#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;overflow-y:auto}
.brand{padding:0 24px 28px;display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#7BA9FF);display:grid;place-items:center;font-weight:800;color:white;font-size:18px}
.brand-name{font-weight:700;font-size:16px;letter-spacing:-0.01em}
.brand-sub{font-size:11px;color:var(--text-dim);letter-spacing:0.02em;text-transform:uppercase}
.nav-section{padding:0 12px;flex:1}
.nav-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.08em;padding:16px 12px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius-sm);color:var(--text-dim);font-size:14px;font-weight:500;width:100%;text-align:left;transition:all 0.15s}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:rgba(79,142,247,0.12);color:var(--primary)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:12px 24px;border-top:1px solid var(--border);font-size:11px;color:var(--text-faint)}

#main{overflow-y:auto;overflow-x:hidden;padding:32px 40px 100px;scroll-behavior:smooth}
.view-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.view-title{font-size:24px;font-weight:700;letter-spacing:-0.02em}
.view-sub{color:var(--text-dim);font-size:13px;margin-top:4px}
.view-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
.kpi-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:10px}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.1}
.kpi-value.pos{color:var(--success)}
.kpi-value.neg{color:var(--danger)}
.kpi-delta{font-size:12px;color:var(--text-dim);margin-top:6px;display:flex;align-items:center;gap:4px}
.kpi-delta.up{color:var(--success)}
.kpi-delta.down{color:var(--danger)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.chart-wrap{position:relative;height:260px}
.chart-wrap.tall{height:320px}

.goal{display:flex;align-items:center;gap:16px;padding:14px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:10px}
.goal:last-child{margin-bottom:0}
.goal-ring{position:relative;width:56px;height:56px;flex-shrink:0}
.goal-ring svg{transform:rotate(-90deg)}
.goal-ring-bg{fill:none;stroke:var(--border);stroke-width:4}
.goal-ring-fg{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 0.8s ease}
.goal-ring-text{position:absolute;inset:0;display:grid;place-items:center;font-size:12px;font-weight:700}
.goal-info{flex:1;min-width:0}
.goal-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-amount{font-size:12px;color:var(--text-dim)}
.goal-status{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600}
.goal-status.ok{background:rgba(46,204,138,0.15);color:var(--success)}
.goal-status.warn{background:rgba(245,179,66,0.15);color:var(--warning)}
.goal-status.late{background:rgba(232,80,74,0.15);color:var(--danger)}

.btn{padding:9px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;border:1px solid transparent}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-dim)}
.btn-ghost{background:var(--surface);border-color:var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-danger{background:rgba(232,80,74,0.12);color:var(--danger);border-color:rgba(232,80,74,0.25)}
.btn-danger:hover{background:rgba(232,80,74,0.2)}
.btn svg{width:14px;height:14px}
.btn-sm{padding:6px 10px;font-size:12px}

#fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--primary);color:white;font-size:28px;font-weight:300;line-height:1;box-shadow:0 8px 24px rgba(79,142,247,0.4);z-index:50;display:grid;place-items:center;transition:transform 0.2s}
#fab:hover{transform:scale(1.08)}

.tx-table{width:100%;border-collapse:collapse;font-size:13px}
.tx-table th{text-align:left;padding:10px 12px;color:var(--text-dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border)}
.tx-table td{padding:12px;border-bottom:1px solid var(--border)}
.tx-table tr:last-child td{border-bottom:none}
.tx-table tr:hover td{background:var(--surface-2)}
.tx-amount{font-weight:600;text-align:right}
.tx-amount.pos{color:var(--success)}
.tx-amount.neg{color:var(--danger)}
.tx-amount.neu{color:var(--text-dim)}
.tx-cat{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:6px;background:var(--surface-2);font-size:11px;font-weight:500}
.tx-cat-dot{width:8px;height:8px;border-radius:50%}
.tx-actions{display:flex;gap:4px;justify-content:flex-end;opacity:0;transition:opacity 0.15s}
.tx-table tr:hover .tx-actions{opacity:1}
.icon-btn{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;color:var(--text-dim)}
.icon-btn:hover{background:var(--surface);color:var(--text)}
.icon-btn.danger:hover{background:rgba(232,80,74,0.15);color:var(--danger)}

.input,.select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;transition:border-color 0.15s}
.input:focus,.select:focus{outline:none;border-color:var(--primary)}
.field{margin-bottom:14px}
.field-label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:500}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar .input,.filter-bar .select{width:auto;padding:7px 10px;font-size:13px}
.search-input{position:relative;flex:1;min-width:180px;max-width:280px}
.search-input input{padding-left:32px}
.search-input svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-dim)}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:16px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:6px;display:grid;place-items:center;color:var(--text-dim)}
.modal-close:hover{background:var(--surface-2);color:var(--text)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;box-shadow:var(--shadow);animation:toastIn 0.25s ease;pointer-events:auto}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.goal-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.goal-card-name{font-size:16px;font-weight:600;margin-bottom:4px}
.goal-card-deadline{font-size:12px;color:var(--text-dim)}
.goal-card-bar{height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin:12px 0}
.goal-card-bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease}
.goal-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;font-size:12px}
.goal-card-stat{background:var(--surface-2);padding:10px;border-radius:var(--radius-sm)}
.goal-card-stat-label{color:var(--text-dim);font-size:11px;margin-bottom:3px}
.goal-card-stat-value{font-size:14px;font-weight:600}

.empty{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px}
.empty-title{color:var(--text);font-weight:600;font-size:15px;margin-bottom:6px}

.account-row{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:8px}
.account-name{font-weight:600;font-size:14px}
.account-type{font-size:11px;color:var(--text-dim);margin-top:2px}
.account-balance{font-weight:700;font-variant-numeric:tabular-nums}

#bottomNav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:40;justify-content:space-around}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px;color:var(--text-dim);font-size:10px;font-weight:500;border-radius:var(--radius-sm)}
.bnav-item.active{color:var(--primary)}
.bnav-item svg{width:20px;height:20px}

/* STRATEGY VIEW */
.strat-phases{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.strat-phase{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative}
.strat-phase.current{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
.strat-phase-tag{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;font-weight:700;margin-bottom:8px}
.strat-phase.current .strat-phase-tag{color:var(--primary)}
.strat-phase-name{font-size:15px;font-weight:700;margin-bottom:4px}
.strat-phase-period{font-size:12px;color:var(--text-dim);margin-bottom:14px}
.strat-phase-line{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border);font-size:12px}
.strat-phase-line:first-of-type{border-top:none}
.strat-phase-key{color:var(--text-dim)}
.strat-phase-val{font-weight:600}
.strat-phase-val.pos{color:var(--success)}
.strat-phase-val.neg{color:var(--danger)}

.strat-step{display:flex;gap:14px;padding:14px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:8px;align-items:flex-start}
.strat-step:last-child{margin-bottom:0}
.strat-step-num{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:var(--primary);color:white;font-weight:700;font-size:13px;display:grid;place-items:center}
.strat-step-num.done{background:var(--success)}
.strat-step-content{flex:1}
.strat-step-title{font-weight:600;font-size:14px;margin-bottom:3px}
.strat-step-desc{font-size:13px;color:var(--text-dim);line-height:1.45}
.strat-section{margin-bottom:28px}
.strat-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.strat-section-title::before{content:'';width:3px;height:14px;background:var(--primary);border-radius:2px}
.strat-callout{background:linear-gradient(135deg,rgba(79,142,247,0.08),rgba(79,142,247,0.02));border:1px solid rgba(79,142,247,0.25);border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;line-height:1.55;margin-bottom:14px}
.strat-callout.warn{background:linear-gradient(135deg,rgba(245,179,66,0.08),rgba(245,179,66,0.02));border-color:rgba(245,179,66,0.25)}
.strat-callout-title{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;color:var(--primary)}
.strat-callout.warn .strat-callout-title{color:var(--warning)}

/* PATRIMOINE */
.patri-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.patri-total{background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(79,142,247,0.03));border:1px solid rgba(79,142,247,0.3);border-radius:var(--radius);padding:24px}
.patri-total-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:10px}
.patri-total-value{font-size:36px;font-weight:800;letter-spacing:-0.02em;line-height:1.1}
.patri-total-sub{font-size:13px;color:var(--text-dim);margin-top:8px}
.patri-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:6px}
.patri-item:last-child{margin-bottom:0}
.patri-item-name{font-weight:600;font-size:13px}
.patri-item-type{font-size:11px;color:var(--text-dim)}
.patri-item-value{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}

@media (max-width:1100px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:1fr}
  .strat-phases{grid-template-columns:1fr}
  .patri-grid{grid-template-columns:1fr}
}
@media (max-width:760px){
  #app{grid-template-columns:1fr}
  #sidebar{display:none}
  #bottomNav{display:flex}
  #main{padding:20px 16px 100px}
  .view-title{font-size:20px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}
  .kpi{padding:14px}
  .kpi-value{font-size:20px}
  .grid-2{grid-template-columns:1fr;gap:12px}
  .chart-wrap{height:220px}
  .tx-actions{opacity:1}
  .tx-table th:nth-child(3),.tx-table td:nth-child(3){display:none}
  .modal{max-height:95vh}
  #fab{bottom:78px;right:16px}
  .field-row{grid-template-columns:1fr}
  .patri-total-value{font-size:28px}
}
</style>
</head>
<body>
<div id="app">

  <aside id="sidebar">
    <div class="brand">
      <div class="brand-icon">F</div>
      <div>
        <div class="brand-name">Finances</div>
        <div class="brand-sub">Fab · 2026</div>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Pilotage</div>
      <button class="nav-item active" data-route="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Vue d'ensemble
      </button>
      <button class="nav-item" data-route="transactions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h13M3 7l4-4M3 7l4 4M21 17H8M21 17l-4-4M21 17l-4 4"/></svg>
        Transactions
      </button>
      <button class="nav-item" data-route="patrimoine">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Patrimoine
      </button>
      <div class="nav-label">Stratégie</div>
      <button class="nav-item" data-route="strategy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Plan d'action
      </button>
      <button class="nav-item" data-route="goals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
        Objectifs
      </button>
      <button class="nav-item" data-route="transition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8M17 7h4v4"/></svg>
        Suivi transition
      </button>
      <div class="nav-label">Système</div>
      <button class="nav-item" data-route="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 10v6m11-11h-6M7 12H1m17.2-7.2l-4.2 4.2M9 15l-4.2 4.2m0-14.4L9 9m6 6l4.2 4.2"/></svg>
        Paramètres
      </button>
    </div>
    <div class="sidebar-footer">Données 100% locales<br>Aucun envoi externe</div>
  </aside>

  <main id="main">
    <div id="view"></div>
  </main>

  <nav id="bottomNav">
    <button class="bnav-item active" data-route="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Accueil
    </button>
    <button class="bnav-item" data-route="transactions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h13M3 7l4-4M3 7l4 4M21 17H8M21 17l-4-4M21 17l-4 4"/></svg>Trans.

async function registerUserWithBackend(){

const STORES = ['transactions','accounts','categories','goals'];

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      STORES.forEach(s => { if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:'id'}); });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbAll(store){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbPut(store,obj){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).put(obj);
    tx.oncomplete = () => res(obj);
    tx.onerror = () => rej(tx.error);
  });
}
async function dbDel(store,id){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function dbClear(store){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).clear();
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

/* RECURRING — logique simplifiée

// Salaire selon le mois (alternance jusqu'à sept 2026 inclus, puis ARE)
function salaryFor(mk){
  if(mk <= '2026-09'){
    return {amount:1800, categoryId:'cat_rev_sal', note:`Salaire alternance (${mk})`};
  }
  return {amount:1378, categoryId:'cat_rev_are', note:`ARE France Travail (${mk})`};
}

const ANCHOR_MONTH = '2026-07'; // premier mois généré (juillet)

async function seedRealData(){
  for(const c of DEFAULT_CATEGORIES) await dbPut('categories',c);
  for(const a of DEFAULT_ACCOUNTS) await dbPut('accounts',a);
  for(const g of DEFAULT_GOALS) await dbPut('goals',g);
  await generateBlocks();

/* Génère le bloc de chaque mois, du mois d'ancrage jusqu'au mois SUIVANT le mois courant.
   Un bloc = salaire (sauf juillet déjà encaissé) + charges fixes + CARDIF.
   Tout est daté au 1er du mois. Pas de doublon grâce aux clés template|mois. */
async function generateBlocks(){
  const existing = await dbAll('transactions');
  const existingKeys = new Set(existing.map(t => `${t.templateId}|${monthKey(t.date)}`));

  // Génère UNIQUEMENT jusqu'au mois en cours (jamais les mois suivants).
  // Au minimum le mois d'ancrage (juillet), même si on est encore en juin.
  const now = new Date();
  const curMonth = monthKey(now);
  const lastMonthToGen = curMonth > ANCHOR_MONTH ? curMonth : ANCHOR_MONTH;

  let cursor = new Date(ANCHOR_MONTH + '-01');
  while(monthKey(cursor) <= lastMonthToGen){
    const y = cursor.getFullYear();
    const mi = cursor.getMonth();
    const mk = monthKey(cursor);
    const dateStr = new Date(y, mi, 1).toISOString().slice(0,10);
    const isJuillet = (mk === '2026-07');

    // --- SALAIRE (juillet déjà encaissé → on ne le génère pas) ---
    if(!isJuillet){
      const keyS = `tpl_sal|${mk}`;
      if(!existingKeys.has(keyS)){
        const sal = salaryFor(mk);
        await dbPut('transactions', {
          id: uid(), date: dateStr, amount: sal.amount,
          type:'revenu', categoryId: sal.categoryId, accountId:'acc_bnp',
          note: sal.note, recurring:true, templateId:'tpl_sal',
        });
        existingKeys.add(keyS);
      }
    }

    // --- CHARGES FIXES (juillet : compte joint déjà payé, exclu) ---
    for(const ch of CHARGE_TEMPLATES){
      if(isJuillet && ch.tplId === 'tpl_cj') continue;
      const key = `${ch.tplId}|${mk}`;
      if(existingKeys.has(key)) continue;
      await dbPut('transactions', {
        id: uid(), date: dateStr, amount: ch.amount,
        type:'depense', categoryId: ch.categoryId, accountId:'acc_bnp',
        note: ch.note, recurring:true, templateId: ch.tplId,
      });
      existingKeys.add(key);
    }

    // --- VERSEMENT CARDIF (100 € : crédit CARDIF + débit Bourso) ---
    const keyC = `tpl_card|${mk}`;
    if(!existingKeys.has(keyC)){
      const credit = {
        id: uid(), date: dateStr, amount: 100,
        type:'epargne', categoryId:'cat_epa_card', accountId:'acc_card',
        note:'Versement CARDIF Élite', recurring:true, templateId:'tpl_card',
      };
      await dbPut('transactions', credit);
      await dbPut('transactions', {
        id: uid(), date: dateStr, amount:-100,
        type:'transfert', categoryId:'cat_trf', accountId:'acc_bourso',
        note:'Virement vers CARDIF', recurring:true, templateId:'tpl_card_src', linkedId:credit.id,
      });
      existingKeys.add(keyC);
    }

    cursor = new Date(y, mi + 1, 1);
  }
}

// Solde RÉEL à aujourd'hui : ne compte que les transactions déjà passées (date <= aujourd'hui).
function accountBalance(accId){
  const a = getAcc(accId);
  const todayStr = today();
  return (a.initialBalance || 0) + state.transactions
    .filter(t => t.accountId === accId && t.date <= todayStr)
    .reduce((s,t) => s + t.amount, 0);
}

// Solde PROJETÉ à une date donnée (incluse) : utile pour graphiques et projections.
function accountBalanceAt(accId, dateMax){
  const a = getAcc(accId);
  return (a.initialBalance || 0) + state.transactions
    .filter(t => t.accountId === accId && t.date <= dateMax)
    .reduce((s,t) => s + t.amount, 0);
}

function txMonth(monthStr){ return state.transactions.filter(t => monthKey(t.date) === monthStr); }
function sumByType(txs, type){ return txs.filter(t => t.type === type).reduce((s,t) => s + Math.abs(t.amount), 0); }
function netMonth(monthStr){
  const txs = txMonth(monthStr);
  const rev = sumByType(txs,'revenu');
  const dep = sumByType(txs,'depense');
  return rev - dep;
}
function last12Months(){
  const arr = [];
  const now = new Date();
  for(let i=11;i>=0;i--){
    arr.push(monthKey(new Date(now.getFullYear(), now.getMonth()-i, 1)));
  }
  return arr;
}

/* ---------- ADVISOR ENGINE ----------
   Principe : l'advisor ne conseille QUE lorsque le cycle mensuel est complet
   (salaire encaissé + toutes les charges fixes du mois passées). Il raisonne
   sur le SOLDE RÉEL de BNP (qui intègre déjà les dépenses manuelles ajoutées),
   jamais sur un théorique. */

const SEUIL_SECU_BNP = 400;       // Plancher de sécurité sur BNP
const SEUIL_EPARGNE_BNP = 600;    // Au-dessus = excédent transférable vers Livret A
const TAMPON_BOURSO = 200;        // Minimum à garder sur Bourso (pour CARDIF)
const SEUIL_ALERTE_LIQUIDE = 1500;// Liquide total sous ce seuil pendant ARE = alerte rachat
const MARGE_REFERENCE = 262;      // Marge mensuelle standard (info)

// Le cycle d'un mois est "complet" quand le salaire du mois est encaissé
// ET les charges fixes du mois ont été générées (sorties en bloc).
function cycleComplet(mk){
  const now = stripTime(new Date());
  // Salaire du mois encaissé ? (juillet est déjà dans le solde initial)
  const salaireEncaisse = (mk === '2026-07') || state.transactions.some(t =>
    t.templateId === 'tpl_sal' && t.note && t.note.includes(mk) && stripTime(t.date) <= now
  );
  // Charges fixes du mois présentes ?
  const chargesPresentes = state.transactions.some(t =>
    t.templateId && t.templateId.startsWith('tpl_') &&
    ['tpl_loy','tpl_mut','tpl_sport','tpl_voit','tpl_moto','tpl_tel','tpl_gmf','tpl_wow'].includes(t.templateId) &&
    monthKey(t.date) === mk
  );
  return salaireEncaisse && chargesPresentes;
}

function generateAlerts(){
  const alerts = [];
  const now = new Date();
  const cm = monthKey(now);

  const balBNP = accountBalance('acc_bnp');
  const balBourso = accountBalance('acc_bourso');
  const balLivA = accountBalance('acc_liv');
  const balCardif = accountBalance('acc_card');
  const liquideTotal = balBNP + balBourso + balLivA;

  const phase = cm <= '2026-09' ? 'alternance' : (cm <= '2028-03' ? 'are' : 'reprise');
  const complet = cycleComplet(cm);

  // === ALERTES DE SÉCURITÉ (toujours actives, même en cours de mois) ===
  if(balBNP < SEUIL_SECU_BNP){
    if(balBourso > TAMPON_BOURSO){
      const aRapatrier = Math.min(balBourso - TAMPON_BOURSO, SEUIL_SECU_BNP - balBNP);
      alerts.push({
        level:'danger', icon:'⚠',
        title:'BNP sous le seuil de sécurité',
        desc:`Ton BNP est à ${fmt.eurFull(balBNP)} (plancher conseillé : ${fmt.eur(SEUIL_SECU_BNP)}). Tu as ${fmt.eurFull(balBourso)} sur Bourso, tu peux te dépanner.`,
        action:`Si besoin, vire ${fmt.eur(aRapatrier)} de Bourso → BNP (à faire toi-même)`
      });
    } else {
      alerts.push({
        level:'danger', icon:'⚠',
        title:'BNP bas et Bourso insuffisant',
        desc:`BNP à ${fmt.eurFull(balBNP)}, Bourso à ${fmt.eurFull(balBourso)}. Tes deux comptes courants sont serrés.`,
        action:`Envisage un rachat partiel CARDIF (8 jours de délai) si un prélèvement important arrive`
      });
    }
  }

  if(balBourso < 100){
    alerts.push({
      level:'warn', icon:'!',
      title:'Bourso trop bas pour le prélèvement CARDIF',
      desc:`Bourso à ${fmt.eurFull(balBourso)}. Le versement CARDIF (100 €) du 28 risque de ne pas passer.`,
      action:`Vire ${fmt.eur(200 - balBourso)} vers Bourso avant le 28 (à faire toi-même)`
    });
  }

  // === CONSEILS D'ÉPARGNE (uniquement si cycle complet) ===
  if(complet){
    // Excédent réel sur BNP au-dessus du seuil d'épargne
    if(balBNP > SEUIL_EPARGNE_BNP){
      const excedent = Math.floor((balBNP - SEUIL_EPARGNE_BNP) / 10) * 10;
      if(excedent >= 20){
        alerts.push({
          level:'info', icon:'↑',
          title:'Cycle du mois bouclé — épargne possible',
          desc:`Toutes tes charges du mois sont passées. Il te reste ${fmt.eurFull(balBNP)} sur BNP. Au-dessus de ton matelas de ${fmt.eur(SEUIL_EPARGNE_BNP)}, tu peux placer l'excédent sur Livret A (2,4%).`,
          action:`Vire ${fmt.eur(excedent)} de BNP → Livret A (à faire toi-même)`
        });
      }
    } else {
      alerts.push({
        level:'ok', icon:'✓',
        title:'Cycle du mois bouclé — rien à transférer',
        desc:`Charges passées, il te reste ${fmt.eurFull(balBNP)} sur BNP. C'est au niveau (ou en-dessous) de ton matelas de sécurité de ${fmt.eur(SEUIL_EPARGNE_BNP)}. Garde tout sur BNP ce mois-ci.`,
        action:null
      });
    }

    // Excédent Bourso (au-delà du tampon)
    if(balBourso > 400){
      const exc = Math.floor((balBourso - TAMPON_BOURSO) / 10) * 10;
      alerts.push({
        level:'info', icon:'↑',
        title:'Bourso au-dessus du tampon nécessaire',
        desc:`Tu as ${fmt.eurFull(balBourso)} sur Bourso (tampon utile : ${fmt.eur(TAMPON_BOURSO)}). Le reste ne rapporte rien là où il est.`,
        action:`Vire ${fmt.eur(exc)} de Bourso → Livret A (à faire toi-même)`
      });
    }
  } else {
    // Mois en cours : pas encore de conseil d'épargne
    alerts.push({
      level:'info', icon:'ⓘ',
      title:'Mois en cours — conseils d\'épargne en attente',
      desc:`Toutes les charges du mois ne sont pas encore passées. Les conseils de placement apparaîtront une fois le cycle bouclé (salaire encaissé + charges sorties). Ajoute tes dépenses au fil de l'eau pour que le calcul reste juste.`,
      action:null
    });
  }

  // === ALERTE RACHAT CARDIF (selon phase et trajectoire) ===
  if(phase === 'are'){
    if(liquideTotal < SEUIL_ALERTE_LIQUIDE){
      alerts.push({
        level:'danger', icon:'◯',
        title:'Liquide bas pendant l\'ARE — rachat CARDIF à prévoir',
        desc:`Liquide total : ${fmt.eurFull(liquideTotal)} (seuil d'alerte : ${fmt.eur(SEUIL_ALERTE_LIQUIDE)}). À ce niveau, un imprévu te mettrait en difficulté.`,
        action:`Demande un rachat partiel CARDIF de 2 000-3 000 € (gratuit, 8 jours)`
      });
    }
    // Projection fin d'ARE basée sur le déficit réel observé
    const moisRestantsAre = Math.max(0, monthsDiff(today(), '2028-03-31'));
    const projFin = liquideTotal - moisRestantsAre * 160;
    if(projFin < 300 && liquideTotal >= SEUIL_ALERTE_LIQUIDE){
      alerts.push({
        level:'warn', icon:'◯',
        title:'Trajectoire fin de formation à surveiller',
        desc:`Au rythme de -160 €/mois, ton liquide finirait vers ${fmt.eur(projFin)} en mars 2028. Anticipe un rachat CARDIF plutôt que de finir à sec.`,
        action:`Prévoir un rachat CARDIF de ${fmt.eur(Math.max(2000, Math.ceil((600-projFin)/500)*500))} dans les prochaines semaines`
      });
    }
  }

  if(phase === 'alternance' && complet){
    // Rappel du plan : rachat CARDIF d'août si le coussin n'est pas constitué
    if(cm === '2026-08' && balLivA < 2000){
      alerts.push({
        level:'warn', icon:'◯',
        title:'Rappel : rachat CARDIF prévu en août',
        desc:`Pour aborder l'ARE avec un vrai matelas, le plan prévoit un rachat CARDIF de 2 500 € ce mois-ci. Ton Livret A est à ${fmt.eurFull(balLivA)}.`,
        action:`Prendre RDV avec ton conseiller Amaury Dufresnoy pour le rachat partiel`
      });
    }
  }

  return alerts;
}

async function go(route){
  state.route = route;

  await (routes[route] || routes.dashboard)();
  document.getElementById('main').scrollTop = 0;
}

// somme des transactions de ce compte, ce mois-ci, déjà passées (date <= aujourd'hui).
function monthlyVariation(accId){
  const cm = monthKey(new Date());
  const todayStr = today();
  return state.transactions
    .filter(t => t.accountId === accId && monthKey(t.date) === cm && t.date <= todayStr)
    .reduce((s,t) => s + t.amount, 0);
}

function renderDashGoals(){
  const wrap = document.getElementById('dashGoals');
  wrap.innerHTML = state.goals.map(g => {
    const pct = Math.min(1, g.current / g.target);
    const monthsLeft = monthsDiff(today(), g.deadline);
    const needed = monthsLeft > 0 ? (g.target - g.current) / monthsLeft : 0;
    let status = 'ok', label = 'En bonne voie';
    if(monthsLeft <= 0 && pct < 1){ status = 'late'; label = 'Échéance dépassée'; }
    else if(needed > 500){ status = 'warn'; label = 'Rythme à intensifier'; }
    const c = 25, circ = 2 * Math.PI * c;
    return `
      <div class="goal">
        <div class="goal-ring">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle class="goal-ring-bg" cx="28" cy="28" r="${c}"/>
            <circle class="goal-ring-fg" cx="28" cy="28" r="${c}" stroke="${status==='ok'?'var(--success)':status==='warn'?'var(--warning)':'var(--danger)'}" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"/>
          </svg>
          <div class="goal-ring-text">${Math.round(pct*100)}%</div>
        </div>
        <div class="goal-info">
          <div class="goal-name">${g.name}</div>
          <div class="goal-amount num">${fmt.eur(g.current)} / ${fmt.eur(g.target)}</div>
        </div>
        <div class="goal-status ${status}">${label}</div>
      </div>
    `;
  }).join('');
}

function drawDonut(){
  const ctx = document.getElementById('chartDonut');
  if(!ctx || typeof Chart === 'undefined') return;
  const cm = monthKey(new Date());
  const txs = txMonth(cm).filter(t => t.type === 'depense');
  const byCat = {};
  txs.forEach(t => {
    const c = getCat(t.categoryId);
    byCat[c.name] = (byCat[c.name] || 0) + Math.abs(t.amount);
    byCat[c.name+'__color'] = c.color;
  });
  const labels = Object.keys(byCat).filter(k => !k.endsWith('__color'));
  if(!labels.length){ ctx.parentElement.innerHTML = '<div class="empty">Pas de dépenses ce mois</div>'; return; }
  const data = labels.map(l => byCat[l]);
  const colors = labels.map(l => byCat[l+'__color']);
  state.charts.donut = new Chart(ctx, {
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#1C1F2E',borderWidth:2}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{
        legend:{position:'right',labels:{color:'#8B92A8',font:{size:11,family:'Inter'},boxWidth:10,padding:10}},
        tooltip:{callbacks:{label:c => `${c.label}: ${fmt.eur(c.parsed)}`}}
      }
    }
  });
}

function drawBars(){
  const ctx = document.getElementById('chartBars');
  if(!ctx || typeof Chart === 'undefined') return;
  const months = last12Months();
  const rev = months.map(m => sumByType(txMonth(m),'revenu'));
  const dep = months.map(m => -sumByType(txMonth(m),'depense'));
  const epa = months.map(m => sumByType(txMonth(m),'epargne'));
  state.charts.bars = new Chart(ctx, {
    type:'bar',
    data:{
      labels: months.map(m => fmt.monthLabel(m+'-01')),
      datasets:[
        {label:'Revenus',data:rev,backgroundColor:'#2ECC8A',borderRadius:4,stack:'a'},
        {label:'Dépenses',data:dep,backgroundColor:'#E8504A',borderRadius:4,stack:'a'},
        {label:'Épargne',data:epa,backgroundColor:'#4F8EF7',borderRadius:4,stack:'b'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        x:{stacked:true,ticks:{color:'#5C6379',font:{size:10}},grid:{display:false}},
        y:{ticks:{color:'#5C6379',font:{size:10},callback:v => fmt.eur(v)},grid:{color:'rgba(255,255,255,0.05)'}}
      },
      plugins:{
        legend:{labels:{color:'#8B92A8',font:{size:11},boxWidth:10}},
        tooltip:{callbacks:{label:c => `${c.dataset.label}: ${fmt.eur(Math.abs(c.parsed.y))}`}}
      }
    }
  });
}

function drawLine(){
  const ctx = document.getElementById('chartLine');
  if(!ctx || typeof Chart === 'undefined') return;
  const months = last12Months();
  const liqIds = ['acc_bnp','acc_bourso','acc_liv'];
  const initial = liqIds.reduce((s,id) => s + (getAcc(id).initialBalance || 0), 0);
  const data = months.map(m => {
    const upToEnd = state.transactions.filter(t => {
      return monthKey(t.date) <= m && liqIds.includes(t.accountId);
    }).reduce((s,t) => s + t.amount, 0);
    return initial + upToEnd;
  });
  state.charts.line = new Chart(ctx, {
    type:'line',
    data:{
      labels: months.map(m => fmt.monthLabel(m+'-01')),
      datasets:[{
        label:'Liquide cumulé',data,
        borderColor:'#4F8EF7',backgroundColor:'rgba(79,142,247,0.1)',
        tension:0.35,fill:true,pointBackgroundColor:'#4F8EF7',pointRadius:3,pointHoverRadius:6,borderWidth:2
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        x:{ticks:{color:'#5C6379',font:{size:10}},grid:{display:false}},
        y:{ticks:{color:'#5C6379',font:{size:10},callback:v => fmt.eur(v)},grid:{color:'rgba(255,255,255,0.05)'}}
      },
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c => fmt.eurFull(c.parsed.y)}}
      }
    }
  });
}

// Étapes du plan : certaines se cochent automatiquement selon tes soldes réels,
// d'autres manuellement (cochage persistant dans localStorage).
function getManualDone(){
  try { return JSON.parse(localStorage.getItem('finances_v2_steps_done') || '{}'); }
  catch { return {}; }
}
function setManualDone(key, val){
  const d = getManualDone();
  d[key] = val;
  localStorage.setItem('finances_v2_steps_done', JSON.stringify(d));
}

function renderActionSteps(){
  const wrap = document.getElementById('actionSteps');
  if(!wrap) return;

  const balBourso = accountBalance('acc_bourso');
  const balLivA = accountBalance('acc_liv');
  const manual = getManualDone();

  // Définition des étapes. auto = condition calculée ; manualKey = cochable à la main.
  const steps = [
    {
      title:'Transfert Bourso → Livret A (~979 €)',
      desc:`Garde ~200 € de tampon sur Bourso et place le reste sur Livret A (2,4 %). État actuel : Bourso ${fmt.eur(balBourso)} · Livret A ${fmt.eur(balLivA)}.`,
      auto: (balBourso <= 300 && balLivA >= 500),
    },
    {
      title:'Épargner la marge mensuelle (262 €) quand c\'est possible',
      desc:`Chaque fin de mois, regarde l'alerte du dashboard. Si BNP dépasse 600 €, transfère l'excédent vers Livret A. Sinon, ne touche à rien.`,
      manualKey:'marge_mensuelle',
    },
    {
      title:'Rachat partiel CARDIF en août — 2 500 €',
      desc:`Pour aborder l'ARE avec un vrai matelas. Se coche automatiquement quand ton Livret A dépasse 3 000 €. État : Livret A ${fmt.eur(balLivA)}.`,
      auto: (balLivA >= 3000),
    },
    {
      title:'RDV France Travail mi-août',
      desc:`Confirmer le montant ARE exact (≈1 378 €/mois sur 548 jours) et l'enchaînement ARE → ARE Formation pendant l'AFPA.`,
      manualKey:'rdv_france_travail',
    },
    {
      title:'Audit des abonnements',
      desc:`Sport (40 €), WoW (13 €), téléphone (20 €) = ~70 €/mois étudiables. Garde ce qui compte vraiment pour toi.`,
      manualKey:'audit_abos',
    },
    {
      title:'Conserver le versement CARDIF de 100 €/mois',
      desc:`Discipline d'épargne qui paiera plus tard. À reconsidérer seulement si la situation se dégrade.`,
      manualKey:'cardif_100',
    },
  ];

  wrap.innerHTML = steps.map((s, i) => {
    const done = s.auto !== undefined ? s.auto : !!manual[s.manualKey];
    const num = done ? '✓' : (i+1);
    const clickable = s.manualKey ? `data-step="${s.manualKey}" style="cursor:pointer"` : '';
    return `
      <div class="strat-step" ${clickable}>
        <div class="strat-step-num ${done?'done':''}">${num}</div>
        <div class="strat-step-content">
          <div class="strat-step-title">${s.title} ${s.manualKey ? `<span style="font-size:11px;color:var(--text-faint);font-weight:400">(clique pour ${done?'décocher':'cocher'})</span>` : (done?'<span style="font-size:11px;color:var(--success);font-weight:600">✓ fait</span>':'')}</div>
          <div class="strat-step-desc">${s.desc}</div>
        </div>
      </div>
    `;
  }).join('');

  // Cochage manuel
  wrap.querySelectorAll('[data-step]').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.step;
      setManualDone(key, !getManualDone()[key]);
      renderActionSteps();
    };
  });
}

/* ---------- VIEW: TRANSITION ---------- */
async function renderTransition(){
  // Project balance over next 24 months
  const now = new Date();
  const startBNP = accountBalance('acc_bnp');
  const startBourso = accountBalance('acc_bourso');
  const startLivA = accountBalance('acc_liv');
  const startLiquide = startBNP + startBourso + startLivA;
  const labels = [];
  const optimist = [];
  const realist = [];
  const pessimist = [];

  let balR = startLiquide, balO = startLiquide, balP = startLiquide;

  for(let i = 0; i <= 24; i++){
    const d = addMonths(now, i);
    labels.push(d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}));
    const mk = monthKey(d);
    // Phase logic
    let monthlyChange;
    if(mk <= '2026-09'){
      monthlyChange = 262; // alternance (marge réelle)
    } else if(mk <= '2028-03'){
      monthlyChange = -160; // ARE (déficit réel)
    } else {
      monthlyChange = 400; // estimated post-emploi
    }
    balR += monthlyChange;
    balO += monthlyChange + 50; // optimist: 50€/mois de mieux
    balP += monthlyChange - 100; // pessimist: dépenses non prévues
    realist.push(balR);
    optimist.push(balO);
    pessimist.push(balP);
  }

  const endRealist = realist[realist.length-1];
  const minRealist = Math.min(...realist);
  const minMonth = labels[realist.indexOf(minRealist)];

  document.getElementById('view').innerHTML = `
    <div class="view-header">
      <div>
        <div class="view-title">Suivi de transition</div>
        <div class="view-sub">Projection de ton liquide (Courant + Livret A) sur 24 mois</div>

        <div class="kpi-value num ${minRealist < 1000 ? 'neg' : ''}">${fmt.eur(minRealist)}</div>
        <div class="kpi-delta">Vers ${minMonth}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Fin de transition</div>
        <div class="kpi-value num">${fmt.eur(realist[18] || 0)}</div>
        <div class="kpi-delta">Mars 2028 (fin ARE)</div>

      <div class="kpi">

        <div class="kpi-value num">${fmt.eur(accountBalance('acc_card'))}</div>
        <div class="kpi-delta">À ne pas toucher</div>

function applyTxFilters(){
  const search = document.getElementById('fSearch').value.toLowerCase();
  const type = document.getElementById('fType').value;
  const cat = document.getElementById('fCat').value;
  const acc = document.getElementById('fAcc').value;
  const month = document.getElementById('fMonth').value;
  let filtered = state.transactions;
  if(type) filtered = filtered.filter(t => t.type === type);
  if(cat) filtered = filtered.filter(t => t.categoryId === cat);
  if(acc) filtered = filtered.filter(t => t.accountId === acc);
  if(month) filtered = filtered.filter(t => monthKey(t.date) === month);
  if(search) filtered = filtered.filter(t => (t.note||'').toLowerCase().includes(search) || getCat(t.categoryId).name.toLowerCase().includes(search));
  renderTxTable(filtered);
}

function renderTxTable(txs){
  const wrap = document.getElementById('txTable');
  if(!txs.length){ wrap.innerHTML = '<div class="empty">Aucune transaction</div>'; return; }
  const sorted = [...txs].sort((a,b) => b.date.localeCompare(a.date));
  wrap.innerHTML = `<table class="tx-table">
    <thead><tr><th>Date</th><th>Description</th><th>Catégorie</th><th>Compte</th><th style="text-align:right">Montant</th><th></th></tr></thead>
    <tbody>
    ${sorted.map(t => {
      const c = getCat(t.categoryId);
      const a = getAcc(t.accountId);
      const cls = t.type === 'transfert' ? 'neu' : (t.amount>=0?'pos':'neg');
      return `<tr>
        <td style="color:var(--text-dim);white-space:nowrap">${fmt.dateShort(t.date)}</td>
        <td>${t.note || '<span style="color:var(--text-faint)">—</span>'}${t.recurring?' <span title="Récurrente" style="color:var(--text-faint);font-size:11px">↻</span>':''}</td>
        <td><span class="tx-cat"><span class="tx-cat-dot" style="background:${c.color}"></span>${c.name}</span></td>
        <td style="color:var(--text-dim);font-size:12px">${a.name}</td>
        <td class="tx-amount num ${cls}">${t.amount>=0?'+':''}${fmt.eurFull(t.amount)}</td>
        <td><div class="tx-actions">
          <button class="icon-btn" data-edit="${t.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>
          <button class="icon-btn danger" data-del="${t.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
        </div></td>
      </tr>`;
    }).join('')}
    </tbody></table>`;
  wrap.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openTxModal(b.dataset.edit));
  wrap.querySelectorAll('[data-del]').forEach(b => b.onclick = () => deleteTx(b.dataset.del));
}

function openTxModal(id){
  const t = id ? state.transactions.find(x => x.id === id) : null;
  const isNew = !t;
  const data = t || {date:today(),amount:0,type:'depense',categoryId:'',accountId:'acc_bnp',note:'',recurring:false};

  // Comptes sélectionnables (on autorise CARDIF comme destination d'épargne/transfert, mais pas la Maison)
  const selectableAccounts = state.accounts.filter(a => a.id !== 'acc_maison');
  const accOptions = (selectedId) => selectableAccounts.map(a => `<option value="${a.id}" ${a.id===selectedId?'selected':''}>${a.name}</option>`).join('');

  openModal(`
    <div class="modal-header">
      <div class="modal-title">${isNew?'Nouvelle transaction':'Modifier'}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">Type</label>
        <div style="display:flex;gap:4px;background:var(--surface-2);padding:3px;border-radius:8px">
          ${['revenu','depense','epargne','transfert'].map(ty => `<button type="button" class="${ty===data.type?'active':''}" data-type="${ty}" style="flex:1;padding:7px;font-size:12px;font-weight:600;color:${ty===data.type?'white':'var(--text-dim)'};background:${ty===data.type?'var(--primary)':'transparent'};border-radius:5px">${ty==='revenu'?'Revenu':ty==='depense'?'Dépense':ty==='epargne'?'Épargne':'Transfert'}</button>`).join('')}
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label class="field-label">Date</label><input type="date" class="input" id="mDate" value="${data.date}"></div>
        <div class="field"><label class="field-label">Montant (€)</label><input type="number" step="0.01" class="input num" id="mAmount" value="${Math.abs(data.amount)}"></div>
      </div>
      <div class="field"><label class="field-label">Catégorie</label><select class="select" id="mCat"></select></div>

      <!-- Compte unique (revenu / dépense / épargne) -->
      <div class="field" id="fieldSingleAcc"><label class="field-label">Compte</label><select class="select" id="mAcc">${accOptions(data.accountId)}</select></div>

      <!-- Comptes source/destination (transfert) -->
      <div class="field" id="fieldFromAcc" style="display:none"><label class="field-label">Depuis le compte</label><select class="select" id="mFrom">${accOptions(data.fromAccountId || 'acc_bourso')}</select></div>
      <div class="field" id="fieldToAcc" style="display:none"><label class="field-label">Vers le compte</label><select class="select" id="mTo">${accOptions(data.toAccountId || 'acc_liv')}</select></div>

      <div class="field"><label class="field-label">Description</label><input class="input" id="mNote" value="${(data.note||'').replace(/"/g,'&quot;')}"></div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="mRec" ${data.recurring?'checked':''}>Transaction récurrente (mensuelle)</label></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="mSave">${isNew?'Ajouter':'Enregistrer'}</button>
    </div>
  `);

  let currentType = data.type;

  function refreshCatSelect(){
    const sel = document.getElementById('mCat');
    const opts = state.categories.filter(c => c.type === currentType);
    sel.innerHTML = opts.map(c => `<option value="${c.id}" ${c.id===data.categoryId?'selected':''}>${c.name}</option>`).join('');
    if(!opts.find(c => c.id === data.categoryId) && opts[0]) sel.value = opts[0].id;
  }

  function refreshLayout(){
    const isTransfer = currentType === 'transfert';
    document.getElementById('fieldSingleAcc').style.display = isTransfer ? 'none' : '';
    document.getElementById('fieldFromAcc').style.display = isTransfer ? '' : 'none';
    document.getElementById('fieldToAcc').style.display = isTransfer ? '' : 'none';
  }

  refreshCatSelect();
  refreshLayout();

  document.querySelectorAll('[data-type]').forEach(btn => btn.onclick = () => {
    currentType = btn.dataset.type;
    document.querySelectorAll('[data-type]').forEach(b => {
      const active = b.dataset.type === currentType;
      b.classList.toggle('active', active);
      b.style.color = active ? 'white' : 'var(--text-dim)';
      b.style.background = active ? 'var(--primary)' : 'transparent';
    });
    refreshCatSelect();
    refreshLayout();
  });

  document.getElementById('mSave').onclick = async () => {
    const amount = Math.abs(parseFloat(document.getElementById('mAmount').value) || 0);
    const date = document.getElementById('mDate').value;
    const note = document.getElementById('mNote').value.trim();
    const recurring = document.getElementById('mRec').checked;

    if(amount === 0){ toast('Montant à zéro','error'); return; }

    if(currentType === 'transfert'){
      const fromId = document.getElementById('mFrom').value;
      const toId = document.getElementById('mTo').value;
      if(fromId === toId){ toast('Choisis deux comptes différents','error'); return; }

      // Si on édite un transfert existant, on supprime l'ancienne paire d'abord
      if(t){
        const old = state.transactions.filter(x => x.id === t.id || x.linkedId === t.id || (t.linkedId && (x.id === t.linkedId || x.linkedId === t.linkedId)));
        for(const o of old){ await dbDel('transactions', o.id); }
        state.transactions = state.transactions.filter(x => !old.find(o => o.id === x.id));
      }

      const fromName = getAcc(fromId).name;
      const toName = getAcc(toId).name;
      const baseNote = note || `Virement ${fromName} → ${toName}`;
      const debitId = uid();
      const creditId = uid();
      // Débit sur le compte source
      const debit = { id:debitId, date, amount:-amount, type:'transfert', categoryId:'cat_trf', accountId:fromId, note:baseNote, recurring, linkedId:creditId };
      // Crédit sur le compte destination
      const credit = { id:creditId, date, amount:amount, type:'transfert', categoryId:'cat_trf', accountId:toId, note:baseNote, recurring, linkedId:debitId };
      await dbPut('transactions', debit);
      await dbPut('transactions', credit);
      state.transactions.push(debit, credit);
      syncTransactionToBackend(debit);
      syncTransactionToBackend(credit);
    } else {
      const sign = (currentType === 'depense') ? -1 : 1;
      const tx = {
        id: t ? t.id : uid(),
        date,
        amount: sign * amount,
        type: currentType,
        categoryId: document.getElementById('mCat').value,
        accountId: document.getElementById('mAcc').value,
        note,
        recurring,
      };
      await dbPut('transactions', tx);
      if(t){ const i = state.transactions.findIndex(x => x.id === t.id); state.transactions[i] = tx; }
      else state.transactions.push(tx);
      syncTransactionToBackend(tx);

    updateGoalCurrents();
    closeModal();
    toast(isNew?'Transaction ajoutée':'Transaction modifiée','success');
    go(state.route);
  };
}

async function deleteTx(id){
  if(!confirm('Supprimer cette transaction ?')) return;
  await dbDel('transactions', id);
  state.transactions = state.transactions.filter(t => t.id !== id);
  updateGoalCurrents();
  syncDeleteTransactionToBackend(id);
  toast('Transaction supprimée');
  go(state.route);
}

/* ---------- VIEW: GOALS ---------- */
async function renderGoals(){
  document.getElementById('view').innerHTML = `
    <div class="view-header">
      <div>
        <div class="view-title">Objectifs financiers</div>
        <div class="view-sub">3 jalons stratégiques · auto-calculés depuis tes comptes</div>
      </div>
    </div>
    <div class="grid-3">
      ${state.goals.map(g => {
        const pct = Math.min(1, g.current / g.target);
        const monthsLeft = monthsDiff(today(), g.deadline);
        const remaining = g.target - g.current;
        const hasSources = Array.isArray(g.sources) && g.sources.length > 0;
        // Effort mensuel : seulement pertinent si l'objectif se finance par épargne (pas de sources ponctuelles)
        const needed = (!hasSources && monthsLeft > 0) ? Math.max(0, remaining / monthsLeft) : 0;
        let color = '#2ECC8A';
        if(monthsLeft <= 0 && pct < 1) color = '#E8504A';
        else if(!hasSources && needed > 300) color = '#F5B342';
        return `
          <div class="goal-card">
            <div class="goal-card-head">
              <div>
                <div class="goal-card-name">${g.name}</div>
                <div class="goal-card-deadline">Échéance : ${fmt.date(g.deadline)}</div>
              </div>
            </div>
            ${g.description ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;line-height:1.45">${g.description}</div>` : ''}
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
              <span class="num">${fmt.eur(g.current)}</span>
              <span style="color:var(--text-dim)" class="num">${fmt.eur(g.target)}</span>
            </div>
            <div class="goal-card-bar"><div class="goal-card-bar-fill" style="width:${pct*100}%;background:${color}"></div></div>
            <div style="text-align:right;font-size:11px;color:var(--text-dim)">${Math.round(pct*100)}% atteint</div>
            ${hasSources ? `
              <div style="margin-top:16px">
                <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.04em;font-weight:600;margin-bottom:8px">Comment l'atteindre</div>
                ${g.sources.map(s => `
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface-2);border-radius:6px;margin-bottom:5px;font-size:12px">
                    <span style="color:var(--text-dim)">${s.label}</span>
                    <span class="num" style="font-weight:600">${fmt.eur(s.amount)}</span>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="goal-card-stats">
                <div class="goal-card-stat">
                  <div class="goal-card-stat-label">Reste à épargner</div>
                  <div class="goal-card-stat-value num">${fmt.eur(Math.max(0,remaining))}</div>
                </div>
                <div class="goal-card-stat">
                  <div class="goal-card-stat-label">Effort mensuel</div>
                  <div class="goal-card-stat-value num" style="color:${needed>300?'var(--warning)':'var(--text)'}">${monthsLeft > 0 ? fmt.eur(needed)+'/mois' : '—'}</div>
                </div>
              </div>
            `}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

    <div class="modal-header"><div class="modal-title">Modifier ${a.name}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label class="field-label">Solde initial (€)</label><input type="number" step="0.01" class="input num" id="aInit" value="${a.initialBalance || 0}"></div>
      <div style="font-size:12px;color:var(--text-dim)">C'est le solde du compte au moment où tu commences à suivre dans l'app. Les transactions s'y ajoutent (ou s'en retranchent).</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="aSave">Enregistrer</button>
    </div>
  `);
  document.getElementById('aSave').onclick = async () => {
    a.initialBalance = parseFloat(document.getElementById('aInit').value) || 0;
    await dbPut('accounts', a);
    updateGoalCurrents();
    closeModal();
    toast('Solde initial mis à jour','success');
    go('settings');
  };
}

async function exportJson(){
  const data = {version:2,exportedAt:new Date().toISOString(),transactions:state.transactions,accounts:state.accounts,categories:state.categories,goals:state.goals};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const aEl = document.createElement('a');
  aEl.href = url; aEl.download = `finances-backup-${today()}.json`; aEl.click();
  URL.revokeObjectURL(url);
  toast('Sauvegarde téléchargée','success');
}
async function exportCsv(){
  const rows = [['date','type','categorie','compte','montant','description']];
  state.transactions.forEach(t => rows.push([t.date,t.type,getCat(t.categoryId).name,getAcc(t.accountId).name,t.amount,(t.note||'').replace(/"/g,'""')]));
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const aEl = document.createElement('a');
  aEl.href = url; aEl.download = `finances-${today()}.csv`; aEl.click();
  URL.revokeObjectURL(url);
  toast('Export CSV téléchargé','success');
}
async function importJson(e){
  const f = e.target.files[0];
  if(!f) return;
  if(!confirm('Restaurer cette sauvegarde ? Tes données actuelles seront remplacées.')) return;
  const r = new FileReader();
  r.onload = async () => {
    try{
      const data = JSON.parse(r.result);
      for(const s of STORES) await dbClear(s);
      for(const t of (data.transactions||[])) await dbPut('transactions',t);
      for(const a of (data.accounts||[])) await dbPut('accounts',a);
      for(const c of (data.categories||[])) await dbPut('categories',c);
      for(const g of (data.goals||[])) await dbPut('goals',g);
      await loadAll();
      toast('Sauvegarde restaurée','success');
      go('dashboard');
    }catch(err){ toast('Fichier invalide','error'); }
  };
  r.readAsText(f);
}
async function resetAll(){
  if(!confirm('Effacer toutes les données et recharger la démo ?')) return;
  for(const s of STORES) await dbClear(s);
  localStorage.removeItem('finances_v2_clean_seeded');
  await seedRealData();
  await loadAll();
  toast('Données réinitialisées','success');
  go('dashboard');
}

document.getElementById('fab').onclick = () => openTxModal();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}

(async function init(){
  try{
    await registerUserWithBackend();
    
    await loadAll();
    
    // Essayer de charger du backend si activé
    const backendData = await loadFromBackend();
    if(backendData && backendData.transactions && backendData.transactions.length > 0){
      // Données du backend disponibles, les utiliser
      state.transactions = backendData.transactions.map(t => ({
        ...t,
        date: typeof t.date === 'string' ? t.date : new Date(t.date).toISOString().slice(0,10),
      }));
      if(backendData.accounts){
        for(const acc of backendData.accounts){
          const existing = state.accounts.find(a => a.id === acc.accountId);
          if(existing) Object.assign(existing, acc);
        }
      }
      if(backendData.categories){
        state.categories = backendData.categories;
      }
      if(backendData.goals){
        state.goals = backendData.goals;
      }
      // Sauvegarder localement pour offline
      for(const tx of state.transactions) await dbPut('transactions', tx);
      for(const cat of state.categories) await dbPut('categories', cat);
      for(const goal of state.goals) await dbPut('goals', goal);
      console.log('✓ Données synchronisées depuis backend');
    } else if(!localStorage.getItem('finances_v2_clean_seeded') && state.transactions.length === 0){
      // Aucune donnée backend, utiliser les données initiales
      await seedRealData();
      await loadAll();
    } else {
      // Ajoute les nouvelles catégories par défaut absentes de la base
      const existingCatIds = new Set(state.categories.map(c => c.id));
      for(const c of DEFAULT_CATEGORIES){
        if(!existingCatIds.has(c.id)) await dbPut('categories', c);
      }
      const vir = state.categories.find(c => c.id === 'cat_rev_conjoint');
      if(vir && vir.name !== 'Virement reçu'){
        vir.name = 'Virement reçu';
        await dbPut('categories', vir);
      }
      await fillRecurring();
      await loadAll();
    }
    
    updateGoalCurrents();
    go('dashboard');
  }catch(err){
    console.error(err);
    document.getElementById('view').innerHTML = `<div class="empty"><div class="empty-title">Erreur</div>${err.message}</div>`;
  }
})();
</script>
